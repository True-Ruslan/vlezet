name: M5 Lockfile Generator

on:
  push:
    branches:
      - feat/m5-spatial-3d

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/m5-spatial-3d
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Generate lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile
      - name: Commit lockfile when changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            echo "Lockfile already current"
            exit 0
          fi
          git commit -m "build: refresh pnpm lockfile for M5"
          git push origin HEAD:feat/m5-spatial-3d
