name: M6 Patch Helper

on:
  push:
    paths:
      - .m6-apply-patch

permissions:
  contents: write

jobs:
  apply:
    if: github.ref_name == 'feat/m6-1-deterministic-layout-alternatives'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/m6-1-deterministic-layout-alternatives
          fetch-depth: 1
      - name: Apply feature patch
        shell: bash
        run: |
          git apply --check .m6-apply-patch
          git apply .m6-apply-patch
          rm .m6-apply-patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: apply M6.1 integration patch"
          git push origin HEAD:feat/m6-1-deterministic-layout-alternatives
