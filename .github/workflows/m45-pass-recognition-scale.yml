name: M4.5 Pass Recognition Scale

on:
  push:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Apply guarded scale wiring
        run: node .github/scripts/m45-pass-recognition-scale.mjs
      - name: Commit fix and self-delete workflow
        shell: bash
        run: |
          git rm .github/scripts/m45-pass-recognition-scale.mjs .github/workflows/m45-pass-recognition-scale.yml
          git add apps/web/components/projects/project-app.tsx
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: pass calibrated scale to local recognition"
          git push
