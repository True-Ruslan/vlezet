name: M5 Strict Verify

on:
  push:
    branches:
      - feat/m5-spatial-3d

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Frozen install
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm test
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Production build
        run: pnpm build
