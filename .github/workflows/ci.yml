name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        id: tests
        shell: bash
        run: |
          set +e
          pnpm test 2>&1 | tee test.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload test diagnostics
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: test.log
          if-no-files-found: error
          retention-days: 3

      - name: Typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm typecheck 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload typecheck diagnostics
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 3

      - name: Lint
        id: lint
        shell: bash
        run: |
          set +e
          pnpm lint 2>&1 | tee lint.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload lint diagnostics
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics
          path: lint.log
          if-no-files-found: error
          retention-days: 3

      - name: Build
        id: build
        shell: bash
        run: |
          set +e
          pnpm build 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload build diagnostics
        if: failure() && steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build.log
          if-no-files-found: error
          retention-days: 3
